<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞行日志 Pro - 硅基流动多模态版</title>
    <style>
        /* === 核心样式 (保留原有变量) === */
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; 
            --bg: #f8fafc; --text: #334155; --border: #cbd5e1;
            --dom-stay-bg: #dbeafe; --dom-stay-text: #1e40af;
            --dom-no-bg: #d1fae5; --dom-no-text: #065f46;
            --int-stay-bg: #f3e8ff; --int-stay-text: #6b21a8;
            --int-no-bg: #fef3c7; --int-no-text: #92400e;
            --meal-bg: #fff7ed; --meal-text: #c2410c; --meal-border: #ffedd5;
            --tax-red: #dc2626; --income-green: #16a34a;
            --warn-bg: #fee2e2; --warn-text: #991b1b;
            --ok-green: #16a34a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 60px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); overflow: hidden; }
        .card-header { padding: 15px 20px; background: #fff; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
        .card-body { padding: 20px; }
        
        .top-bar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 16px 24px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(37,99,235,0.3); margin-bottom: 10px; }
        .user-pill { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; backdrop-filter: blur(4px); margin-top: 5px; display: inline-block; }

        /* AI 输入框增强 */
        .ai-box { position: relative; border: 2px dashed var(--border); border-radius: 12px; padding: 15px; background: #f8fafc; transition: 0.3s; }
        .ai-box:focus-within { border-color: var(--primary); }
        .key-input { position: absolute; top: 10px; right: 10px; padding: 6px; border-radius: 6px; border: 1px solid var(--border); width: 140px; font-size: 0.75rem; background: rgba(255,255,255,0.9); z-index: 10; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; resize: none; outline: none; margin-top: 10px; }
        
        .image-upload-zone { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn-upload { background: #fff; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .img-preview-box { width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; overflow: hidden; border: 1px solid #e2e8f0; display: none; position: relative; }
        .img-preview-box img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .remove-img { position: absolute; top: 5px; right: 5px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }

        /* 薪资表格与统计样式 */
        .salary-summary-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #eff6ff; padding: 15px; border-radius: 12px; border: 1px solid #bfdbfe; }
        .ss-item { text-align: center; }
        .ss-label { font-size: 0.75rem; color: #64748b; }
        .ss-val { font-size: 1.1rem; font-weight: 800; font-family: monospace; }
        .salary-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .salary-table th { text-align: left; padding: 10px 8px; border-bottom: 2px solid #e2e8f0; color: #64748b; }
        .salary-table td { padding: 12px 8px; border-bottom: 1px dashed #e2e8f0; }
        .col-amt { text-align: right; font-weight: 700; font-family: monospace; }

        /* 其他原有样式... */
        .comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .comp-panel { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
        .progress-track { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; transition: width 0.3s; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { background: #fff; border: 1px solid var(--border); border-radius: 10px; min-height: 90px; padding: 4px; position: relative; cursor: pointer; }
        .flight-tag { padding: 3px 4px; border-radius: 3px; font-size: 0.65rem; color: #fff; margin-bottom: 2px; }
        .tag-dom { background: #3b82f6; } .tag-int { background: #8b5cf6; }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 20; border-radius: 12px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .settings-modal { background: white; padding: 25px; border-radius: 16px; width: 320px; }
        .edit-form { background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid var(--primary); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .form-full { grid-column: 1 / -1; }

        @media (max-width: 768px) {
            .cal-day { min-height: 55px; }
            .cal-flights, .cal-status { display: none; }
            .mobile-report-view { display: grid; gap: 10px; }
            .table-wrapper { display: none; }
        }
    </style>
</head>
<body>

    <!-- 设置模态框 -->
    <div id="settingsModal" class="modal-overlay">
        <div class="settings-modal">
            <h3 style="margin-bottom:15px; text-align:center;">⚙️ 配置</h3>
            <div class="form-group" style="margin-bottom:10px;">
                <label style="font-size:0.75rem;">职级</label>
                <select id="set_rank" style="width:100%; padding:8px; border-radius:6px;"><option value="教员">教员</option><option value="机长" selected>机长</option><option value="副驾驶">副驾驶</option></select>
            </div>
            <div class="form-group" style="margin-bottom:10px;">
                <label style="font-size:0.75rem;">英语等级</label>
                <select id="set_icao" style="width:100%; padding:8px; border-radius:6px;"><option value="signed">已签署</option><option value="unsigned">未签署</option></select>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="saveSettings()">保存</button>
            <button class="btn" style="width:100%; margin-top:5px; background:none; color:#64748b;" onclick="document.getElementById('settingsModal').style.display='none'">取消</button>
        </div>
    </div>

    <!-- 登录屏幕 -->
    <div id="loginScreen" class="login-screen" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#1e3a8a; color:white;">
        <h1 style="font-size:3rem; margin-bottom:10px;">✈️</h1>
        <h2 style="margin-bottom:30px;">飞行日志 Pro</h2>
        <button class="btn" style="background:white; color:#1e3a8a; padding:15px 40px;" onclick="loginWithGoogle()">Google 登录</button>
    </div>

    <div id="app" class="container" style="display: none;">
        <div class="top-bar">
            <div><h1 style="font-size: 1.3rem;">控制台</h1><div id="userInfo" class="user-pill">加载中...</div></div>
            <div>
                <button class="btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="document.getElementById('settingsModal').style.display='flex'">⚙️</button>
                <button class="btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="doLogout()">退出</button>
            </div>
        </div>

        <!-- 合规仪表盘 -->
        <section class="card">
            <div class="card-header"><h2>🛡️ 合规监控</h2></div>
            <div class="card-body"><div class="comp-grid" id="complianceDashboard"></div></div>
        </section>

        <!-- 薪资结算 -->
        <section class="card">
            <div class="card-header"><h2>💰 结算预估</h2><span id="taxRateDisplay" style="font-size:0.75rem; background:#f3e8ff; color:#6b21a8; padding:2px 6px; border-radius:4px;">税率 45%</span></div>
            <div class="card-body">
                <div class="salary-summary-box">
                    <div class="ss-item"><div class="ss-label">固定实发</div><div class="ss-val">96,080</div></div>
                    <div class="ss-item"><div class="ss-label">变动(税后)</div><div class="ss-val" id="disp_net_var">0</div></div>
                    <div class="ss-item"><div class="ss-label">合计实发</div><div class="ss-val" id="disp_total_bank" style="color:var(--primary)">¥0</div></div>
                </div>
                <table class="salary-table"><thead><tr><th>项目</th><th>计算</th><th class="col-amt">金额</th></tr></thead><tbody id="salaryTableBody"></tbody></table>
            </div>
        </section>

        <!-- 统计 -->
        <section class="card">
            <div class="card-header"><h2>📊 月度统计</h2><input type="month" id="reportMonth" onchange="refreshAll()" style="padding:5px; border-radius:5px; border:1px solid #ddd;"></div>
            <div class="card-body">
                <div class="table-wrapper"><table class="excel-table" id="reportTable"></table></div>
                <div class="mobile-report-view" id="mobileReportCards"></div>
            </div>
        </section>

        <!-- 日历 -->
        <section class="card">
            <div class="card-header"><h2>📅 执勤日历</h2><span id="calTotal" style="font-size:0.8rem; color:#64748b;"></span></div>
            <div class="card-body"><div class="calendar-grid" id="calendarGrid"></div></div>
        </section>

        <!-- 智能录入 (硅基流动 Vision) -->
        <section class="card">
            <div class="card-header"><h2>📝 智能录入 (SiliconFlow)</h2><button class="btn btn-primary" id="aiBtn" onclick="processAI()">✨ 开始识别</button></div>
            <div class="card-body">
                <div class="ai-box">
                    <div id="aiLoading" class="loading-overlay"><div class="spinner"></div></div>
                    <input type="password" id="innerApiKey" class="key-input" placeholder="SiliconFlow API Key">
                    
                    <div class="image-upload-zone">
                        <button class="btn-upload" onclick="document.getElementById('imgInput').click()">📸 上传任务书图片</button>
                        <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="handleImagePreview(this)">
                        <span id="imgNameLabel" style="font-size:0.75rem; color:#94a3b8;">未选择图片</span>
                        <label style="font-size:0.75rem; cursor:pointer;"><input type="checkbox" id="isUTC" checked> 原数据 UTC</label>
                    </div>

                    <div id="imgPreviewBox" class="img-preview-box">
                        <button class="remove-img" onclick="clearImage()">✕</button>
                        <img id="imgPreview" src="">
                    </div>

                    <textarea id="ocrInput" placeholder="或者直接粘贴任务文本..."></textarea>
                </div>

                <!-- 编辑表单 -->
                <div id="editForm" class="edit-form">
                    <input type="hidden" id="edit_doc_id">
                    <div class="form-grid">
                        <div class="form-group"><label>日期</label><input type="date" id="f_date"></div>
                        <div class="form-group"><label>机型</label><select id="f_ac_type"><option value="G650ER">G650ER</option><option value="CL850">CL850</option></select></div>
                        <div class="form-group"><label>起飞/落地</label><div style="display:flex; gap:5px;"><input type="text" id="f_dep" placeholder="沈阳"><input type="text" id="f_arr" placeholder="上海"></div></div>
                        <div class="form-group"><label>航线</label><select id="f_cat"><option value="国内">国内</option><option value="亚洲国际">亚洲国际</option><option value="洲际">洲际</option></select></div>
                        <div class="form-group"><label>起落(日/夜)</label><div style="display:flex; gap:5px;"><input type="number" id="f_landings_day" value="0"><input type="number" id="f_landings_night" value="0"></div></div>
                        <div class="form-group"><label>总时间(h)</label><input type="number" step="0.01" id="f_total_time"></div>
                        <div class="form-group"><label>滑行天数</label><input type="number" id="f_block_days"></div>
                        <div class="form-group"><label>夜航(前/后)</label><div style="display:flex; gap:5px;"><input type="number" step="0.1" id="f_night1" value="0"><input type="number" step="0.1" id="f_night2" value="0"></div></div>
                        <div class="form-group"><label>驻外类型</label><select id="f_overnight"><option value="无">无</option><option value="国内有过夜">国内有过夜</option><option value="国际有过夜">国际有过夜</option></select></div>
                        <div class="form-group"><label>国内/外餐</label><div style="display:flex; gap:5px;"><input type="number" id="f_meal_dom" value="0"><input type="number" id="f_meal_int" value="0"></div></div>
                    </div>
                    <div style="margin-top:15px; text-align:right;">
                        <button class="btn" style="background:#f1f5f9;" onclick="document.getElementById('editForm').style.display='none'">取消</button>
                        <button class="btn btn-primary" onclick="saveRecord()">💾 保存</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 明细列表 -->
        <section class="card">
            <div class="card-header"><h2>📋 明细</h2></div>
            <div class="card-body"><div id="logList"></div></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = { 
            apiKey: "AIzaSyCFk4f7bKUHlb3d1Cg1jyS1EM-SPC4pr40", 
            authDomain: "myflightlog-1f4cb.firebaseapp.com", 
            projectId: "myflightlog-1f4cb", 
            storageBucket: "myflightlog-1f4cb.firebasestorage.app", 
            messagingSenderId: "181072044112", 
            appId: "1:181072044112:web:ca312da2d4780227cef155" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let allRecords = [];

        // --- 核心薪资配置 (保持 45% 税率原则) ---
        const FIXED_BASE_NET = 96080.65;
        const FEE_CONFIG = {
            "机长": { hk:640, asia:640, out:720, n1:80, n2:200, stay_dom:500, stay_int:900 },
            "教员": { hk:720, asia:720, out:810, n1:80, n2:200, stay_dom:500, stay_int:900 },
            "副驾驶": { hk:320, asia:320, out:360, n1:25, n2:60, stay_dom:400, stay_int:700 }
        };

        // --- 登录逻辑 ---
        window.loginWithGoogle = () => signInWithPopup(auth, provider);
        window.doLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('userInfo').textContent = user.displayName;
                document.getElementById('reportMonth').value = new Date().toISOString().slice(0, 7);
                const savedKey = localStorage.getItem("sf_api_key");
                if(savedKey) document.getElementById("innerApiKey").value = savedKey;

                onSnapshot(query(collection(db, `users/${user.uid}/logs`), orderBy("date", "desc")), (snap) => {
                    allRecords = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    refreshAll();
                });
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // --- 图片预览处理 ---
        window.handleImagePreview = (input) => {
            const file = input.files[0];
            if (file) {
                document.getElementById('imgNameLabel').textContent = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('imgPreviewBox').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        window.clearImage = () => {
            document.getElementById('imgInput').value = '';
            document.getElementById('imgPreview').src = '';
            document.getElementById('imgPreviewBox').style.display = 'none';
            document.getElementById('imgNameLabel').textContent = '未选择图片';
        };

        // --- 硅基流动 AI 识别 (多模态) ---
        window.processAI = async () => {
            const apiKey = document.getElementById('innerApiKey').value.trim();
            const text = document.getElementById('ocrInput').value.trim();
            const previewImg = document.getElementById('imgPreview').src;
            const isUTC = document.getElementById('isUTC').checked;

            if (!apiKey) return alert("请输入硅基流动 API Key");
            if (!text && !previewImg) return alert("请上传图片或粘贴文本");

            localStorage.setItem("sf_api_key", apiKey);
            const btn = document.getElementById('aiBtn');
            const loader = document.getElementById('aiLoading');
            btn.disabled = true; loader.style.display = 'flex';

            const timeHint = isUTC ? "识别到的时间点为UTC，请转为北京时间(UTC+8)。" : "";
            const prompt = `请提取飞行任务书数据并返回纯 JSON 对象。
            字段包含: date(YYYY-MM-DD), ac_type(G650ER/CL850), dep, arr, category(国内/亚洲国际/洲际), flight_no, landings_day(int), landings_night(int), total_time(float), block_days(int), night1(float), night2(float), overnight(无/国内有过夜/国际有过夜), crew_meal_dom(int), crew_meal_int(int)。
            ${timeHint}`;

            try {
                let messages = [];
                let modelName = "deepseek-ai/DeepSeek-V3"; // 默认文本模型

                if (previewImg) {
                    modelName = "Qwen/Qwen2-VL-72B-Instruct"; // 图片识别使用高性能视觉模型
                    messages = [{
                        role: "user",
                        content: [
                            { type: "text", text: prompt },
                            { type: "image_url", image_url: { url: previewImg } }
                        ]
                    }];
                } else {
                    messages = [
                        { role: "system", content: prompt },
                        { role: "user", content: text }
                    ];
                }

                const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: modelName, messages: messages, response_format: { type: "json_object" } })
                });

                const data = await res.json();
                const content = data.choices[0].message.content;
                const r = JSON.parse(content.replace(/```json/g, '').replace(/```/g, ''));

                // 填充表单
                document.getElementById('f_date').value = r.date || '';
                document.getElementById('f_ac_type').value = r.ac_type || 'G650ER';
                document.getElementById('f_dep').value = r.dep || '';
                document.getElementById('f_arr').value = r.arr || '';
                document.getElementById('f_cat').value = r.category || '国内';
                document.getElementById('f_landings_day').value = r.landings_day || 0;
                document.getElementById('f_landings_night').value = r.landings_night || 0;
                document.getElementById('f_total_time').value = r.total_time || 0;
                document.getElementById('f_block_days').value = r.block_days || 0;
                document.getElementById('f_night1').value = r.night1 || 0;
                document.getElementById('f_night2').value = r.night2 || 0;
                document.getElementById('f_overnight').value = r.overnight || '无';
                document.getElementById('f_meal_dom').value = r.crew_meal_dom || 0;
                document.getElementById('f_meal_int').value = r.crew_meal_int || 0;

                document.getElementById('editForm').style.display = 'block';
                if(previewImg) clearImage();

            } catch (e) {
                alert("识别失败: " + e.message);
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        };

        // --- 数据保存 ---
        window.saveRecord = async () => {
            const data = {
                date: document.getElementById('f_date').value,
                ac_type: document.getElementById('f_ac_type').value,
                dep: document.getElementById('f_dep').value,
                arr: document.getElementById('f_arr').value,
                category: document.getElementById('f_cat').value,
                landings_day: parseInt(document.getElementById('f_landings_day').value) || 0,
                landings_night: parseInt(document.getElementById('f_landings_night').value) || 0,
                total_time: parseFloat(document.getElementById('f_total_time').value) || 0,
                block_days: parseInt(document.getElementById('f_block_days').value) || 0,
                night1: parseFloat(document.getElementById('f_night1').value) || 0,
                night2: parseFloat(document.getElementById('f_night2').value) || 0,
                overnight: document.getElementById('f_overnight').value,
                crew_meal_dom: parseInt(document.getElementById('f_meal_dom').value) || 0,
                crew_meal_int: parseInt(document.getElementById('f_meal_int').value) || 0,
            };
            const id = document.getElementById('edit_doc_id').value;
            if(id) await updateDoc(doc(db, `users/${currentUser.uid}/logs`, id), data);
            else await addDoc(collection(db, `users/${currentUser.uid}/logs`), data);
            document.getElementById('editForm').style.display = 'none';
        };

        window.editRecord = (id) => {
            const r = allRecords.find(x => x.id === id);
            document.getElementById('edit_doc_id').value = id;
            document.getElementById('f_date').value = r.date;
            document.getElementById('f_ac_type').value = r.ac_type;
            document.getElementById('f_dep').value = r.dep;
            document.getElementById('f_arr').value = r.arr;
            document.getElementById('f_cat').value = r.category;
            document.getElementById('f_total_time').value = r.total_time;
            document.getElementById('editForm').style.display = 'block';
        };

        window.deleteItem = async (id) => {
            if(confirm("确定删除？")) await deleteDoc(doc(db, `users/${currentUser.uid}/logs`, id));
        };

        // --- 核心刷新逻辑 (薪资/合规/报表) ---
        window.refreshAll = () => {
            const mStr = document.getElementById('reportMonth').value;
            const data = allRecords.filter(r => r.date.startsWith(mStr));
            renderCompliance();
            renderSalary(data);
            renderCalendar(mStr);
            renderReport(data);
            renderList(data);
        };

        function renderCompliance() {
            const now = new Date();
            const start7 = new Date(); start7.setDate(now.getDate() - 6);
            let fatigue7 = allRecords.reduce((sum, r) => {
                const d = new Date(r.date);
                return (d >= start7 && d <= now) ? sum + (r.total_time || 0) : sum;
            }, 0);

            document.getElementById('complianceDashboard').innerHTML = `
                <div class="comp-panel" style="grid-column: 1/-1">
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                        <span>👨‍✈️ 7天疲劳监控</span>
                        <span style="font-weight:bold; color:${fatigue7 > 40 ? '#ef4444' : '#059669'}">${fatigue7.toFixed(1)} / 40h</span>
                    </div>
                    <div class="progress-track"><div class="progress-bar" style="width:${Math.min(fatigue7/40*100, 100)}%; background:${fatigue7 > 40 ? '#ef4444' : '#2563eb'}"></div></div>
                </div>
            `;
        }

        function renderSalary(data) {
            const rank = localStorage.getItem('user_rank') || '机长';
            const cfg = FEE_CONFIG[rank];
            let gross_var = 0;
            let rows = `<tr><td>固定工资</td><td>税后定额</td><td class="col-amt">¥${FIXED_BASE_NET.toLocaleString()}</td></tr>`;

            data.forEach(r => {
                let fee = 0;
                if(r.category === '亚洲国际') fee = (r.total_time * cfg.asia) + (r.block_days * cfg.asia * 0.6);
                else if(r.category === '洲际') fee = (r.total_time * cfg.out) + (r.block_days * cfg.out * 0.6);
                
                if(r.category === '国内') {
                    fee += (r.night1 * cfg.n1) + (r.night2 * cfg.n2);
                }
                gross_var += fee;
            });

            // 统一 45% 税率
            const net_var = gross_var * 0.55; 
            const allowances = data.reduce((s, r) => {
                let sub = (r.crew_meal_dom * 60) + (r.crew_meal_int * 180);
                if(r.overnight === '国内有过夜') sub += cfg.stay_dom;
                if(r.overnight === '国际有过夜') sub += cfg.stay_int;
                return s + sub;
            }, 0);

            if(gross_var > 0) rows += `<tr><td>变动薪酬</td><td>${gross_var.toFixed(0)} * (1-45%)</td><td class="col-amt">¥${net_var.toFixed(2)}</td></tr>`;
            if(allowances > 0) rows += `<tr><td>免税补贴</td><td>餐补+驻外</td><td class="col-amt">¥${allowances}</td></tr>`;

            document.getElementById('salaryTableBody').innerHTML = rows;
            document.getElementById('disp_net_var').textContent = `¥${net_var.toFixed(0)}`;
            document.getElementById('disp_total_bank').textContent = `¥${(FIXED_BASE_NET + net_var + allowances).toLocaleString(undefined, {maximumFractionDigits:0})}`;
        }

        function renderCalendar(mStr) {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const [y, m] = mStr.split('-').map(Number);
            const days = new Date(y, m, 0).getDate();
            
            for(let d=1; d<=days; d++) {
                const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const flights = allRecords.filter(r => r.date === dateStr);
                const cell = document.createElement('div');
                cell.className = 'cal-day';
                cell.innerHTML = `<div style="font-size:0.75rem; color:#94a3b8;">${d}</div>`;
                flights.forEach(f => {
                    cell.innerHTML += `<div class="flight-tag ${f.category==='国内'?'tag-dom':'tag-int'}">${f.dep}-${f.arr}</div>`;
                });
                grid.appendChild(cell);
            }
        }

        function renderReport(data) {
            let s = { air: 0, block: 0, meal: 0 };
            data.forEach(r => { s.air += r.total_time; s.block += r.block_days; s.meal += (r.crew_meal_dom + r.crew_meal_int); });
            document.getElementById('reportTable').innerHTML = `
                <tr><th>总空时</th><td>${s.air.toFixed(1)}h</td><th>总滑行</th><td>${s.block}天</td><th>总餐份</th><td>${s.meal}</td></tr>
            `;
        }

        function renderList(data) {
            document.getElementById('logList').innerHTML = data.map(r => `
                <div style="padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:bold; font-size:0.9rem;">${r.date.slice(5)} ${r.dep} ➔ ${r.arr}</div>
                        <div style="font-size:0.75rem; color:#64748b;">${r.ac_type} | ${r.total_time}h | ${r.category}</div>
                    </div>
                    <div>
                        <button onclick="editRecord('${r.id}')" style="color:var(--primary); background:none; border:none; margin-right:10px;">✏️</button>
                        <button onclick="deleteItem('${r.id}')" style="color:red; background:none; border:none;">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.saveSettings = () => {
            localStorage.setItem('user_rank', document.getElementById('set_rank').value);
            localStorage.setItem('user_icao', document.getElementById('set_icao').value);
            document.getElementById('settingsModal').style.display = 'none';
            refreshAll();
        };

    </script>
</body>
</html>
